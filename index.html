<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f3eb" />
    <title>3Dプリンター事業化ログ</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f3eb;
        --bg-2: #fbfaf6;
        --card: rgba(255, 255, 255, 0.9);
        --card-strong: #ffffff;
        --ink: #1d2420;
        --muted: #5d6660;
        --line: rgba(29, 36, 32, 0.14);
        --accent: #0f766e;
        --accent-2: #b45309;
        --danger: #c2410c;
        --success: #15803d;
        --shadow: 0 18px 50px rgba(29, 36, 32, 0.12);
        --radius-lg: 28px;
        --radius-md: 18px;
        --radius-sm: 12px;
        --tap: 48px;
        font-family: "Hiragino Sans", "Yu Gothic", "YuGothic", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.09), transparent 32rem),
          radial-gradient(circle at top right, rgba(180, 83, 9, 0.09), transparent 28rem),
          linear-gradient(180deg, #f9f7f1 0%, #f3efe5 100%);
        color: var(--ink);
      }

      body {
        -webkit-text-size-adjust: 100%;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button,
      input,
      select,
      textarea {
        border: 1.5px solid var(--line);
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.97);
        color: var(--ink);
      }

      button,
      select,
      input[type="date"],
      input[type="month"],
      input[type="number"],
      input[type="text"],
      textarea {
        min-height: var(--tap);
        padding: 0.82rem 0.9rem;
      }

      input[type="checkbox"] {
        width: 1.15rem;
        height: 1.15rem;
      }

      textarea {
        min-height: 104px;
        resize: vertical;
      }

      button {
        min-width: 88px;
        font-weight: 800;
        cursor: pointer;
      }

      button.primary {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }

      button.secondary {
        background: #fff;
      }

      button.ghost {
        background: transparent;
      }

      button.danger {
        background: #fff;
        color: var(--danger);
        border-color: rgba(194, 65, 12, 0.28);
      }

      button:disabled,
      input:disabled,
      select:disabled,
      textarea:disabled {
        opacity: 0.58;
        cursor: not-allowed;
      }

      a {
        color: inherit;
      }

      .page {
        max-width: 1540px;
        margin: 0 auto;
        padding: 14px 14px 70px;
      }

      .hero {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.76));
        border: 1px solid rgba(29, 36, 32, 0.08);
        border-radius: 32px;
        box-shadow: var(--shadow);
        padding: 20px 18px;
        display: grid;
        gap: 12px;
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 0.82rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 900;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(2rem, 7vw, 3.6rem);
        line-height: 1.04;
        letter-spacing: -0.06em;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.7;
        max-width: 54rem;
      }

      .header-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .notice {
        padding: 12px 14px;
        border-radius: 18px;
        background: rgba(15, 118, 110, 0.08);
        border: 1px solid rgba(15, 118, 110, 0.14);
        color: #064e3b;
        font-weight: 700;
        line-height: 1.55;
      }

      .notice.error {
        background: rgba(194, 65, 12, 0.08);
        border-color: rgba(194, 65, 12, 0.18);
        color: #7c2d12;
      }

      .tabs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 12px 2px 8px;
        margin: 8px 0 6px;
        scrollbar-width: thin;
      }

      .tabs button {
        white-space: nowrap;
        min-height: 46px;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--muted);
        border-color: rgba(29, 36, 32, 0.09);
      }

      .tabs button.active {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }

      .content {
        display: grid;
        gap: 14px;
      }

      .section {
        display: grid;
        gap: 14px;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .grid.cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid.four {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .card {
        background: var(--card);
        border: 1px solid rgba(29, 36, 32, 0.08);
        border-radius: 26px;
        box-shadow: var(--shadow);
        padding: 16px;
      }

      .card.compact {
        padding: 14px;
      }

      .card-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .card-head h2,
      .card-head h3 {
        margin: 0;
        font-size: 1.06rem;
      }

      .card-head p {
        margin: 4px 0 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 0.95rem;
      }

      .metric {
        display: grid;
        gap: 10px;
        min-height: 118px;
      }

      .metric .label {
        color: var(--muted);
        font-weight: 700;
        font-size: 0.9rem;
        line-height: 1.4;
      }

      .metric .value {
        font-size: clamp(1.5rem, 4.3vw, 2.4rem);
        line-height: 1;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      .metric .sub {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .form-grid {
        display: grid;
        gap: 12px;
      }

      .form-grid.columns-2,
      .form-grid.columns-3 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form-grid.columns-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field.inline {
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 12px;
      }

      .field label {
        font-weight: 800;
        font-size: 0.95rem;
        line-height: 1.35;
      }

      .field small,
      .helper {
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.5;
      }

      .input-line {
        display: grid;
        gap: 8px;
      }

      .inline-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .inline-controls > * {
        flex: 0 0 auto;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .toolbar > * {
        flex: 0 0 auto;
      }

      .bottom-actions {
        position: sticky;
        bottom: 0;
        z-index: 4;
        margin-top: 8px;
        padding-top: 10px;
        background: linear-gradient(180deg, rgba(246, 243, 235, 0.18), rgba(246, 243, 235, 0.96) 24%);
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.45rem 0.75rem;
        border-radius: 999px;
        border: 1px solid rgba(29, 36, 32, 0.1);
        background: rgba(255, 255, 255, 0.9);
        font-weight: 700;
        font-size: 0.88rem;
        line-height: 1;
      }

      .pill.good {
        color: #166534;
        background: rgba(21, 128, 61, 0.08);
        border-color: rgba(21, 128, 61, 0.15);
      }

      .pill.warn {
        color: #7c2d12;
        background: rgba(194, 65, 12, 0.08);
        border-color: rgba(194, 65, 12, 0.15);
      }

      .pill.muted {
        color: var(--muted);
      }

      .table-wrap {
        overflow-x: auto;
        border-radius: 22px;
        border: 1px solid rgba(29, 36, 32, 0.08);
        background: rgba(255, 255, 255, 0.72);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1120px;
      }

      th,
      td {
        padding: 11px 12px;
        vertical-align: top;
        border-bottom: 1px solid rgba(29, 36, 32, 0.08);
        text-align: left;
        font-size: 0.93rem;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: rgba(249, 247, 241, 0.96);
        color: #34423b;
        font-weight: 900;
      }

      tbody tr:hover {
        background: rgba(15, 118, 110, 0.05);
      }

      td .row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.38rem 0.68rem;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 800;
        line-height: 1;
        border: 1px solid transparent;
      }

      .status-badge.active,
      .status-badge.good {
        background: rgba(21, 128, 61, 0.08);
        color: #166534;
        border-color: rgba(21, 128, 61, 0.14);
      }

      .status-badge.inactive,
      .status-badge.bad {
        background: rgba(194, 65, 12, 0.08);
        color: #9a3412;
        border-color: rgba(194, 65, 12, 0.14);
      }

      .status-badge.neutral {
        background: rgba(100, 116, 139, 0.09);
        color: #475569;
        border-color: rgba(100, 116, 139, 0.14);
      }

      .summary-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .summary-card {
        padding: 14px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(29, 36, 32, 0.08);
      }

      .summary-card .k {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 8px;
        font-weight: 800;
      }

      .summary-card .v {
        font-size: 1.5rem;
        font-weight: 900;
        letter-spacing: -0.03em;
      }

      .footer-note {
        color: rgba(29, 36, 32, 0.7);
        font-size: 0.86rem;
        line-height: 1.65;
        padding: 12px 2px 0;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .stack.tight {
        gap: 8px;
      }

      .notice-area {
        min-height: 24px;
      }

      .muted-block {
        color: var(--muted);
      }

      .live-calc {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .live-calc .box {
        padding: 14px;
        border-radius: 22px;
        background: rgba(15, 118, 110, 0.06);
        border: 1px solid rgba(15, 118, 110, 0.12);
      }

      .live-calc .box .label {
        color: var(--muted);
        font-size: 0.86rem;
        font-weight: 800;
        margin-bottom: 8px;
      }

      .live-calc .box .value {
        font-size: 1.4rem;
        font-weight: 900;
      }

      .subtle-box {
        padding: 12px 14px;
        border-radius: 18px;
        background: rgba(29, 36, 32, 0.04);
        border: 1px dashed rgba(29, 36, 32, 0.15);
      }

      .import-box {
        display: grid;
        gap: 12px;
      }

      .radio-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .radio-chip {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 0.55rem 0.75rem;
        border-radius: 999px;
        border: 1px solid rgba(29, 36, 32, 0.12);
        background: rgba(255, 255, 255, 0.95);
        font-weight: 700;
      }

      .mini-title {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      .nowrap {
        white-space: nowrap;
      }

      @media (max-width: 1020px) {
        .grid.three,
        .grid.four,
        .summary-grid,
        .live-calc,
        .grid.cards,
        .form-grid.columns-2,
        .form-grid.columns-3,
        .form-grid.columns-4 {
          grid-template-columns: 1fr;
        }

        table {
          min-width: 980px;
        }
      }

      @media (max-width: 640px) {
        .page {
          padding-inline: 10px;
          padding-bottom: 84px;
        }

        .hero {
          padding: 16px 14px;
          border-radius: 26px;
        }

        .card,
        .card.compact {
          padding: 14px;
          border-radius: 22px;
        }

        .bottom-actions {
          gap: 8px;
        }

        button {
          width: 100%;
        }

        .toolbar button,
        .inline-controls button,
        .bottom-actions button,
        .tabs button {
          width: auto;
        }

        .tabs {
          padding-bottom: 4px;
        }
      }
    </style>
  </head>

      function persistLocalCache(db = state.db) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: 1, exportedAt: nowIso(), data: db }));
          return true;
        } catch (error) {
          console.error("Failed to save database:", error);
          return false;
        }

      function loadLocalCache() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            const fresh = createDefaultDatabase();
            persistLocalCache(fresh);
            return fresh;
          }
          const parsed = JSON.parse(raw);
          const db = normalizeDatabase(parsed && parsed.data ? parsed.data : parsed);
          ensureSeedData(db);
          return db;
        } catch (error) {
          console.warn("Failed to load localStorage database:", error);
          state.notice = "localStorageの読み込みに失敗したため、初期データで復旧しました。";
          state.noticeKind = "error";
          const fresh = createDefaultDatabase();
          persistLocalCache(fresh);
          return fresh;
        }
      }

      async function seedRemoteIfEmpty() {
        if (!state.firebase.db || state.firebase.seedAttempted) return;
        const remote = await Promise.all([
          fetchCollectionOnce("products", normalizeProduct),

          fetchCollectionOnce("sales", normalizeSale)
        ]);
        const [products, devLogs, sales] = remote;
        if (products.length || devLogs.length || sales.length) {
          state.firebase.remoteDb = { products, devLogs, sales };
          applyRemoteDb(remoteDbFromCollections());
          return;
        }
        state.firebase.seedAttempted = true;
        setSyncState("保存中", "初期データをFirestoreへ登録中");
        const batch = writeBatch(state.firebase.db);

          const item = normalizeProduct({

            active: product.active

          batch.set(doc(collection(familyDocRef(), "products"), item.id), item);

          margin: ((SEED_SALE.unitPrice * SEED_SALE.quantity - SEED_SALE.shipping - SEED_SALE.fee - SEED_SALE.materialCost - SEED_SALE.packagingCost - SEED_SALE.otherCost) / (SEED_SALE.unitPrice * SEED_SALE.quantity)) * 100
        });
        batch.set(doc(collection(familyDocRef(), "sales"), saleItem.id), saleItem);
        await batch.commit();
      }

      async function startFirestoreSync() {
        if (!state.firebase.db || !state.auth.user) return;
        clearFirestoreListeners();
        state.firebase.collectionsReady = { products: false, devLogs: false, sales: false };
        try {
          const [products, devLogs, sales] = await Promise.all([
            fetchCollectionOnce("products", normalizeProduct),
            fetchCollectionOnce("devLogs", normalizeDevLog),
            fetchCollectionOnce("sales", normalizeSale)
          ]);
          state.firebase.remoteDb = { products, devLogs, sales };
          applyRemoteDb(remoteDbFromCollections());
          await seedRemoteIfEmpty();
          const productsRef = familyCollectionRef("products");
          const devLogsRef = familyCollectionRef("devLogs");
          const salesRef = familyCollectionRef("sales");
          if (!productsRef || !devLogsRef || !salesRef) return;
          state.firebase.unsubscribers.push(
            onSnapshot(productsRef, (snapshot) => {
              markCollectionReady("products", collectionDocsToArray(snapshot, normalizeProduct), normalizeProduct);
            }, handleFirestoreError),
            onSnapshot(devLogsRef, (snapshot) => {
              markCollectionReady("devLogs", collectionDocsToArray(snapshot, normalizeDevLog), normalizeDevLog);
            }, handleFirestoreError),
            onSnapshot(salesRef, (snapshot) => {
              markCollectionReady("sales", collectionDocsToArray(snapshot, normalizeSale), normalizeSale);
            }, handleFirestoreError)
          );
          state.firebase.initialized = true;
          setSessionToFirestore("同期済み");
          renderApp();
        } catch (error) {
          handleFirestoreError(error);
        }
      }

      function handleFirestoreError(error) {
        console.error("Firestore sync failed:", error);
        clearFirestoreListeners();
        state.firebase.initialized = true;
        setSessionToLocal("Firestore 読み込みに失敗したため localStorage を表示しています");
        state.notice = "Firestoreの読み込みに失敗したため、localStorage のデータを表示しています。";
        state.noticeKind = "error";
        renderApp();
      }

      async function initializeFirebaseServices() {
        if (!isFirebaseConfigured()) {
          state.firebase.configured = false;
          state.firebase.initialized = true;
          state.auth.ready = true;
          state.auth.user = null;
          state.auth.email = "";
          state.auth.error = "";
          setSessionToLocal("FirebaseConfig 未設定のため localStorage を表示しています");
          renderApp();
          return;
        }
        try {
          state.firebase.configured = true;
          const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
          state.firebase.app = app;
          state.firebase.auth = getAuth(app);
          state.firebase.db = getFirestore(app);
          onAuthStateChanged(state.firebase.auth, async (user) => {
            clearFirestoreListeners();
            state.firebase.collectionsReady = { products: false, devLogs: false, sales: false };
            state.firebase.seedAttempted = false;
            state.firebase.initialized = false;
            state.auth.ready = true;
            state.auth.user = user || null;
            state.auth.email = user?.email || "";
            state.auth.error = "";
            state.auth.localMode = false;
            if (user) {
              setSyncState("保存中", "Firestore を同期中");
              renderApp();
              await startFirestoreSync();
              return;
            }
            state.firebase.initialized = true;
            setUnauthenticatedState();
            state.notice = "Firebase にログインしてください。";
            state.noticeKind = "success";
            renderApp();
          });
        } catch (error) {
          handleFirestoreError(error);
        }
      }

      async function signInOrRegister(mode) {
        if (!state.firebase.auth) {
          setAuthState({ error: "Firebase設定が未完了です。", ready: true });
          setSessionToLocal("FirebaseConfig を入力すると同期が有効になります");
          renderApp();
          return;
        }
        const email = normalizeText(state.auth.emailInput);
        const password = normalizeText(state.auth.passwordInput);
        if (!email || !password) {
          setAuthState({ error: "メールアドレスとパスワードを入力してください。" });
          renderApp();
          return;
        }
        try {
          setAuthState({ error: "" });
          setSyncState("保存中", mode === "register" ? "アカウント作成中" : "ログイン中");
          if (mode === "register") {
            await createUserWithEmailAndPassword(state.firebase.auth, email, password);
          } else {
            await signInWithEmailAndPassword(state.firebase.auth, email, password);
          }
        } catch (error) {
          setAuthState({ error: error?.message || "ログインに失敗しました。", ready: true });
          state.firebase.initialized = true;
          state.auth.localMode = false;
          state.sync.status = "エラー";
          state.sync.detail = error?.message || "ログインに失敗しました。";
          state.sync.error = error?.message || "ログインに失敗しました。";
          state.sync.saving = false;
          state.notice = error?.message || "ログインに失敗しました。";
          state.noticeKind = "error";
          renderApp();
        }
      }

      async function migrateLocalCacheToFirestore() {
        if (!state.firebase.db || !state.auth.user) {
          showNotice("Firestore にログインしてから実行してください。", "error");
          return;
        }
        const confirmed = confirm("この端末のlocalStorageデータをFirestoreへアップロードします。既存IDは上書きせず、重複しないものだけ追加します。よろしいですか？");
        if (!confirmed) return;
        const remote = await Promise.all([
          fetchCollectionOnce("products", normalizeProduct),
          fetchCollectionOnce("devLogs", normalizeDevLog),
          fetchCollectionOnce("sales", normalizeSale)
        ]);
        const remoteIds = {
          products: new Set(remote[0].map((item) => item.id)),
          devLogs: new Set(remote[1].map((item) => item.id)),
          sales: new Set(remote[2].map((item) => item.id))
        };
        const batch = writeBatch(state.firebase.db);
        let added = 0;
        for (const product of state.db.products) {
          if (remoteIds.products.has(product.id)) continue;
          batch.set(doc(collection(familyDocRef(), "products"), product.id), normalizeProduct(product));
          added += 1;
        }
        for (const log of state.db.devLogs) {
          if (remoteIds.devLogs.has(log.id)) continue;
          batch.set(doc(collection(familyDocRef(), "devLogs"), log.id), normalizeDevLog(log));
          added += 1;
        }
        for (const sale of state.db.sales) {
          if (remoteIds.sales.has(sale.id)) continue;
          batch.set(doc(collection(familyDocRef(), "sales"), sale.id), normalizeSale(sale));
          added += 1;
        }
        setSyncState("保存中", "localStorage データをFirestoreへアップロード中");
        await batch.commit();
        setNotice(`${added}件をFirestoreへ追加しました。`, "success");
      }

      function todayString() {
        try {
          const parts = new Intl.DateTimeFormat("en-CA", {
            timeZone: "Asia/Tokyo",
            year: "numeric",
            month: "2-digit",
            day: "2-digit"
          }).formatToParts(new Date());
          const lookup = Object.fromEntries(parts.map((part) => [part.type, part.value]));
          return `${lookup.year}-${lookup.month}-${lookup.day}`;
        } catch (error) {
          const d = new Date();
          const pad = (n) => String(n).padStart(2, "0");
          return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
        }
      }

      function nowIso() {
        return new Date().toISOString();
      }

      function uid(prefix) {
        if (typeof crypto !== "undefined" && crypto && typeof crypto.randomUUID === "function") {
          return `${prefix}_${crypto.randomUUID()}`;
        }
        return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function numberValue(value) {
        if (value === null || value === undefined || value === "") return 0;
        const n = Number(value);
        return Number.isFinite(n) ? n : 0;
      }

      function nullableNumber(value) {
        if (value === null || value === undefined || value === "") return null;
        const n = Number(value);
        return Number.isFinite(n) ? n : null;
      }

      function formatYen(value) {
        if (value === null || value === undefined || value === "") return "-";
        const n = Number(value);
        if (!Number.isFinite(n)) return "¥0";
        return `¥${n.toLocaleString("ja-JP")}`;
      }

      function formatNum(value) {
        if (value === null || value === undefined || value === "") return "-";
        const n = Number(value);
        if (!Number.isFinite(n)) return "0";
        return n.toLocaleString("ja-JP");
      }

      function formatPercent(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return "-";
        return `${n.toFixed(1)}%`;
      }

      function filenameSlug(prefix, ext) {
        return `${prefix}-${todayString()}.${ext}`;
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function normalizeText(value) {
        return String(value ?? "").trim();
      }

      function selectedProductLabel(product) {
        if (!product) return "";
        return `${product.name}${product.active === false ? "（無効）" : ""}`;
      }

      function productOptionMarkup(selectedId = "") {
        const activeOptions = state.db.products
          .slice()
          .sort((a, b) => a.name.localeCompare(b.name, "ja"))
          .map((product) => {
            const selected = String(product.id) === String(selectedId) ? "selected" : "";
            const suffix = product.active === false ? "（無効）" : "";
            return `<option value="${escapeHtml(product.id)}" ${selected}>${escapeHtml(product.name)}${suffix} / ${escapeHtml(product.category || "")}</option>`;
          })
          .join("");
        return `<option value="" ${!selectedId ? "selected" : ""}>選択してください</option>${activeOptions}`;
      }

      function allProductNames() {
        const names = new Set();
        state.db.products.forEach((product) => names.add(product.name));
        state.db.sales.forEach((sale) => names.add(sale.productName));
        return Array.from(names).filter(Boolean).sort((a, b) => a.localeCompare(b, "ja"));
      }

      function allGenresFromData() {
        const genres = new Set(GENRES);
        state.db.products.forEach((product) => product.category && genres.add(product.category));
        state.db.devLogs.forEach((log) => log.genre && genres.add(log.genre));
        state.db.sales.forEach((sale) => sale.genre && genres.add(sale.genre));
        return Array.from(genres).filter(Boolean).sort((a, b) => a.localeCompare(b, "ja"));
      }

      function resolveProductByName(name) {
        return state.db.products.find((product) => product.name === name) || null;
      }

      function enrichSale(sale) {
        const product = sale.productId ? resolveProduct(sale.productId) : resolveProductByName(sale.productName);
        const unitPrice = numberValue(sale.unitPrice);
        const quantity = numberValue(sale.quantity);
        const shipping = numberValue(sale.shipping);
        const fee = numberValue(sale.fee);
        const materialCost = numberValue(sale.materialCost);
        const packagingCost = numberValue(sale.packagingCost);
        const otherCost = numberValue(sale.otherCost);
        const amount = unitPrice * quantity;
        const profit = amount - shipping - fee - materialCost - packagingCost - otherCost;
        const margin = amount > 0 ? (profit / amount) * 100 : null;
        return {
          ...sale,
          productLabel: product ? product.name : sale.productName,
          genreResolved: sale.genre || product?.category || "",
          salesAmount: amount,
          profit,
          margin
        };
      }

      function loadDatabase() {
        return loadLocalCache();
      }

      function createDefaultDatabase() {
        const db = {
          products: [],
          devLogs: [],
          sales: []
        };
        ensureSeedData(db);
        return db;
      }

      function normalizeDatabase(input, options = {}) {
        const source = input && typeof input === "object" ? input : {};
        const products = Array.isArray(source.products) ? source.products.map(normalizeProduct) : [];
        const productMap = new Map(products.map((product) => [String(product.id), product]));
        const db = {
          products,
          devLogs: Array.isArray(source.devLogs) ? source.devLogs.map(normalizeDevLog) : [],
          sales: Array.isArray(source.sales) ? source.sales.map((sale) => normalizeSale(sale, productMap)) : []
        };
        if (options.seed !== false) {
          ensureSeedData(db);
        }
        return db;
      }

      function normalizeProduct(raw) {
        const now = nowIso();
        const id = raw?.id ? String(raw.id) : uid("product");
        return {
          id,
          createdAt: raw?.createdAt || now,
          updatedAt: raw?.updatedAt || now,
          name: normalizeText(raw?.name),
          category: normalizeText(raw?.category) || GENRES[0],
          stage: normalizeText(raw?.stage) || STAGES[0],
          price: raw?.price === "" || raw?.price === null || raw?.price === undefined ? null : numberValue(raw?.price),
          cost: raw?.cost === "" || raw?.cost === null || raw?.cost === undefined ? null : numberValue(raw?.cost),
          printTime: normalizeText(raw?.printTime),
          material: normalizeText(raw?.material),
          priority: normalizeText(raw?.priority) || PRIORITIES[0],
          memo: normalizeText(raw?.memo),
          active: raw?.active !== false
        };
      }

      function normalizeDevLog(raw) {
        const now = nowIso();
        return {
          id: raw?.id ? String(raw.id) : uid("devlog"),
          createdAt: raw?.createdAt || now,
          updatedAt: raw?.updatedAt || now,
          date: normalizeText(raw?.date) || todayString(),
          inputPerson: normalizeText(raw?.inputPerson || raw?.person) || INPUTERS[0],
          recordType: normalizeText(raw?.recordType || raw?.type) || RECORD_TYPES[0],
          productId: normalizeText(raw?.productId || raw?.product_id || ""),
          productName: normalizeText(raw?.productName || raw?.product_name || ""),
          genre: normalizeText(raw?.genre || raw?.category) || GENRES[0],
          problem: normalizeText(raw?.problem || raw?.issue || ""),
          stage: normalizeText(raw?.stage) || STAGES[0],
          a1mini: normalizeText(raw?.a1mini || raw?.a1Mini || ""),
          size: normalizeText(raw?.size || ""),
          material: normalizeText(raw?.material || ""),
          filament: normalizeText(raw?.filament || ""),
          printTime: normalizeText(raw?.printTime || ""),
          printDifficulty: raw?.printDifficulty === "" || raw?.printDifficulty === null || raw?.printDifficulty === undefined ? null : numberValue(raw?.printDifficulty),
          demand: raw?.demand === "" || raw?.demand === null || raw?.demand === undefined ? null : numberValue(raw?.demand),
          competition: raw?.competition === "" || raw?.competition === null || raw?.competition === undefined ? null : numberValue(raw?.competition),
          targetPrice: raw?.targetPrice === "" || raw?.targetPrice === null || raw?.targetPrice === undefined ? null : numberValue(raw?.targetPrice),
          costMemo: normalizeText(raw?.costMemo || ""),
          familyRating: raw?.familyRating === "" || raw?.familyRating === null || raw?.familyRating === undefined ? null : numberValue(raw?.familyRating),
          improvement: normalizeText(raw?.improvement || ""),
          nextAction: normalizeText(raw?.nextAction || ""),
          priority: normalizeText(raw?.priority) || PRIORITIES[0],
          memo: normalizeText(raw?.memo || "")
        };
      }

      function normalizeSale(raw, productLookup = new Map()) {
        const now = nowIso();
        const product = raw?.productId ? productLookup.get(String(raw.productId)) || null : null;
        return {
          id: raw?.id ? String(raw.id) : uid("sale"),
          createdAt: raw?.createdAt || now,
          updatedAt: raw?.updatedAt || now,
          date: normalizeText(raw?.date) || todayString(),
          productId: normalizeText(raw?.productId || ""),
          productName: normalizeText(raw?.productName || product?.name || ""),
          genre: normalizeText(raw?.genre || product?.category || ""),
          channel: normalizeText(raw?.channel) || CHANNELS[0],
          unitPrice: raw?.unitPrice === "" || raw?.unitPrice === null || raw?.unitPrice === undefined ? 0 : numberValue(raw?.unitPrice),
          quantity: raw?.quantity === "" || raw?.quantity === null || raw?.quantity === undefined ? 1 : numberValue(raw?.quantity),
          shipping: raw?.shipping === "" || raw?.shipping === null || raw?.shipping === undefined ? 0 : numberValue(raw?.shipping),
          fee: raw?.fee === "" || raw?.fee === null || raw?.fee === undefined ? 0 : numberValue(raw?.fee),
          materialCost: raw?.materialCost === "" || raw?.materialCost === null || raw?.materialCost === undefined ? 0 : numberValue(raw?.materialCost),
          packagingCost: raw?.packagingCost === "" || raw?.packagingCost === null || raw?.packagingCost === undefined ? 0 : numberValue(raw?.packagingCost),
          otherCost: raw?.otherCost === "" || raw?.otherCost === null || raw?.otherCost === undefined ? 0 : numberValue(raw?.otherCost),
          buyerMemo: normalizeText(raw?.buyerMemo || ""),
          improvementMemo: normalizeText(raw?.improvementMemo || ""),
          salesAmount: raw?.salesAmount === "" || raw?.salesAmount === null || raw?.salesAmount === undefined ? 0 : numberValue(raw?.salesAmount),
          profit: raw?.profit === "" || raw?.profit === null || raw?.profit === undefined ? 0 : numberValue(raw?.profit),
          margin: raw?.margin === "" || raw?.margin === null || raw?.margin === undefined ? null : numberValue(raw?.margin)
        };
      }

      function ensureSeedData(db) {
        if (!Array.isArray(db.products)) db.products = [];
        if (!Array.isArray(db.devLogs)) db.devLogs = [];
        if (!Array.isArray(db.sales)) db.sales = [];

        if (db.products.length === 0 && db.devLogs.length === 0 && db.sales.length === 0) {
          db.products = SEED_PRODUCTS.map((product) => ({
            id: uid("product"),
            createdAt: nowIso(),
            updatedAt: nowIso(),
            name: product.name,
            category: product.category,
            stage: product.stage,
            price: product.price,
            cost: product.cost,
            printTime: product.printTime,
            material: product.material,
            priority: product.priority,
            memo: product.memo,
            active: product.active !== false
          }));
          const product = db.products.find((item) => item.name === SEED_SALE.productName);
          db.sales = [
            {
              id: uid("sale"),
              createdAt: nowIso(),
              updatedAt: nowIso(),
              date: SEED_SALE.date,
              productId: product ? product.id : "",
              productName: SEED_SALE.productName,
              genre: product?.category || "ドール用品",
              channel: SEED_SALE.channel,
              unitPrice: SEED_SALE.unitPrice,
              quantity: SEED_SALE.quantity,
              shipping: SEED_SALE.shipping,
              fee: SEED_SALE.fee,
              materialCost: SEED_SALE.materialCost,
              packagingCost: SEED_SALE.packagingCost,
              otherCost: SEED_SALE.otherCost,
              buyerMemo: SEED_SALE.buyerMemo,
              improvementMemo: SEED_SALE.improvementMemo,
              salesAmount: SEED_SALE.unitPrice * SEED_SALE.quantity,
              profit: SEED_SALE.unitPrice * SEED_SALE.quantity - SEED_SALE.shipping - SEED_SALE.fee - SEED_SALE.materialCost - SEED_SALE.packagingCost - SEED_SALE.otherCost,
              margin: ((SEED_SALE.unitPrice * SEED_SALE.quantity - SEED_SALE.shipping - SEED_SALE.fee - SEED_SALE.materialCost - SEED_SALE.packagingCost - SEED_SALE.otherCost) / (SEED_SALE.unitPrice * SEED_SALE.quantity)) * 100
            }
          ];
        }
      }

      function saveDatabase(db = state.db) {
        const ok = persistLocalCache(db);
        if (!ok) {
          showNotice("保存に失敗しました。ブラウザの保存容量やプライベートモードを確認してください。", "error");
        }
        return ok;
      }

      function setNotice(message, kind = "success", ttl = 2600) {
        state.notice = message;
        state.noticeKind = kind;
        clearTimeout(noticeTimer);
        renderHeaderNotice();
        if (ttl > 0) {
          noticeTimer = setTimeout(() => {
            state.notice = "入力内容を保存できます。";
            state.noticeKind = "success";
            renderHeaderNotice();
          }, ttl);
        }
      }

      function showNotice(message, kind = "success") {
        state.notice = message;
        state.noticeKind = kind;

      }

      function renderHeaderNotice() {
        const notice = document.getElementById("notice");

        notice.className = `notice${state.noticeKind === "error" ? " error" : ""}`;
        notice.textContent = state.notice;
      }

      function renderApp() {
        const app = document.getElementById("app");
        if (!app) return;
        if (!state.firebase.initialized && isFirebaseConfigured() && !state.auth.localMode) {
          app.innerHTML = renderLoadingScreen();
          return;

        if (!state.auth.ready && isFirebaseConfigured() && !state.auth.localMode) {

          return;
        }
        if (!state.auth.user && isFirebaseConfigured() && !state.auth.localMode) {
          app.innerHTML = renderLoginScreen();
          return;
        }
        app.innerHTML = renderMainShell();
        if (state.tab === "sales-list") {

        }
      }

        return `

        return [

      function calculateSalePreview(draft) {
        const unitPrice = numberValue(draft.unitPrice);
        const quantity = Math.max(1, numberValue(draft.quantity) || 1);
        const shipping = numberValue(draft.shipping);
        const fee = numberValue(draft.fee);
        const materialCost = numberValue(draft.materialCost);
        const packagingCost = numberValue(draft.packagingCost);
        const otherCost = numberValue(draft.otherCost);
        const salesAmount = unitPrice * quantity;
        const profit = salesAmount - shipping - fee - materialCost - packagingCost - otherCost;
        const margin = salesAmount > 0 ? (profit / salesAmount) * 100 : null;
        return { salesAmount, profit, margin };
      }

      function renderFilterSummary() {
        const parts = [];
        if (state.filters.search) parts.push(`検索: ${state.filters.search}`);
        if (state.filters.product) parts.push(`商品: ${state.filters.product}`);
        if (state.filters.genre) parts.push(`ジャンル: ${state.filters.genre}`);
        if (state.filters.month) parts.push(`月: ${state.filters.month}`);
        if (state.filters.priorityOnly) parts.push("優先度A");
        if (state.filters.exhibitedOnly) parts.push("出品済み");
        return parts.length ? parts.join(" / ") : "すべて表示";
      }

      function filteredSalesRows() {
        const search = normalizeText(state.filters.search).toLowerCase();
        const rows = state.db.sales.map(enrichSale).filter((row) => {
          if (state.filters.product && row.productLabel !== state.filters.product) return false;
          if (state.filters.genre && (row.genreResolved || "") !== state.filters.genre) return false;
          if (state.filters.month && String(row.date || "").slice(0, 7) !== state.filters.month) return false;
          if (state.filters.priorityOnly) {
            const product = row.productId ? resolveProduct(row.productId) : resolveProductByName(row.productName);
            if (!product || product.priority !== "A：すぐ進める") return false;
          }
          if (state.filters.exhibitedOnly) {
            const product = row.productId ? resolveProduct(row.productId) : resolveProductByName(row.productName);
            if (!product || !["出品済み", "販売実績あり"].includes(product.stage)) return false;
          }
          if (search) {
            const hay = `${row.date} ${row.productLabel || ""} ${row.channel || ""} ${row.genreResolved || ""} ${row.buyerMemo || ""} ${row.improvementMemo || ""}`.toLowerCase();
            if (!hay.includes(search)) return false;
          }
          return true;
        });
        const sort = state.filters.sort;
        rows.sort((a, b) => {
          if (sort === "profit_desc") return b.profit - a.profit;
          if (sort === "profit_asc") return a.profit - b.profit;
          if (sort === "amount_desc") return b.salesAmount - a.salesAmount;
          return String(b.date || "").localeCompare(String(a.date || ""));
        });
        return rows;
      }

      function buildProductAggregates() {
        const map = new Map();
        state.db.sales.map(enrichSale).forEach((sale) => {
          const key = sale.productId || sale.productName;
          if (!map.has(key)) {
            map.set(key, { name: sale.productLabel || sale.productName || "", quantity: 0, amount: 0, profit: 0 });
          }
          const row = map.get(key);
          row.quantity += numberValue(sale.quantity);
          row.amount += sale.salesAmount;
          row.profit += sale.profit;
        });
        return Array.from(map.values())
          .sort((a, b) => b.profit - a.profit)
          .map((row) => ({
            ...row,
            avgUnitPrice: row.quantity > 0 ? row.amount / row.quantity : 0,
            avgMargin: row.amount > 0 ? (row.profit / row.amount) * 100 : null
          }));
      }

      function buildMonthAggregates() {
        const map = new Map();
        state.db.sales.map(enrichSale).forEach((sale) => {
          const month = String(sale.date || "").slice(0, 7) || "不明";
          if (!map.has(month)) {
            map.set(month, { month, quantity: 0, amount: 0, profit: 0 });
          }
          const row = map.get(month);
          row.quantity += numberValue(sale.quantity);
          row.amount += sale.salesAmount;
          row.profit += sale.profit;
        });
        return Array.from(map.values()).sort((a, b) => String(b.month).localeCompare(String(a.month)));
      }

      function buildGenreAggregates() {
        const map = new Map();
        state.db.products.forEach((product) => {
          const key = product.category || "不明";
          if (!map.has(key)) {
            map.set(key, { genre: key, count: 0, quantity: 0, amount: 0, profit: 0 });
          }
          map.get(key).count += 1;
        });
        state.db.sales.map(enrichSale).forEach((sale) => {
          const key = sale.genreResolved || sale.genre || "不明";
          if (!map.has(key)) {
            map.set(key, { genre: key, count: 0, quantity: 0, amount: 0, profit: 0 });
          }
          const row = map.get(key);
          row.quantity += numberValue(sale.quantity);
          row.amount += sale.salesAmount;
          row.profit += sale.profit;
        });
        return Array.from(map.values()).sort((a, b) => b.amount - a.amount);
      }

      function importJsonFromText(rawText) {
        const text = normalizeText(rawText);
        if (!text) {
          showNotice("JSONが空です。", "error");
          return;
        }
        let parsed;
        try {
          parsed = JSON.parse(text);
        } catch (error) {
          showNotice("JSONの形式が不正です。内容を確認してください。", "error");
          return;
        }
        const mode = state.importMode;
        let payload = parsed;
        if (payload && typeof payload === "object" && "data" in payload) {
          payload = payload.data;
        }
        const imported = normalizeBackupPayload(payload);
        if (!imported) {
          showNotice("JSONから商品マスター・商品開発ログ・売上データを読み取れませんでした。", "error");
          return;
        }
        if (mode === "replace") {
          state.db = normalizeDatabase(imported);
        } else {
          state.db = mergeDatabases(state.db, normalizeDatabase(imported));
        }
        ensureSeedData(state.db);
        saveDatabase();
        state.importText = "";
        renderApp();
        setNotice(mode === "replace" ? "JSONで上書き復元しました。" : "JSONを追加で取り込みました。", "success");
      }

      function normalizeBackupPayload(payload) {
        if (!payload || typeof payload !== "object") return null;
        if (Array.isArray(payload)) return null;
        if ("products" in payload || "devLogs" in payload || "sales" in payload) return payload;
        return null;
      }

      function mergeDatabases(base, imported) {
        const result = normalizeDatabase(base);
        const incoming = normalizeDatabase(imported);
        result.products = mergeUniqueById(result.products, incoming.products);
        result.devLogs = mergeUniqueById(result.devLogs, incoming.devLogs);
        result.sales = mergeUniqueById(result.sales, incoming.sales);
        return result;
      }

      function mergeUniqueById(existing, incoming) {
        const map = new Map(existing.map((item) => [item.id, item]));
        incoming.forEach((item) => {
          if (!map.has(item.id)) {
            map.set(item.id, item);
          }
        });
        return Array.from(map.values());
      }

      function importAiLogs(rawText) {
        const text = normalizeText(rawText);
        if (!text) {
          showNotice("AIメモのJSONが空です。", "error");
          return;
        }
        let parsed;
        try {
          parsed = JSON.parse(text);
        } catch (error) {
          showNotice("AIメモのJSON形式が不正です。", "error");
          return;
        }
        if (!Array.isArray(parsed)) {
          showNotice("AIメモはJSON配列で貼り付けてください。", "error");
          return;
        }
        const items = parsed.map(mapAiLogItem).filter(Boolean);
        if (!items.length) {
          showNotice("追加できる商品開発ログが見つかりませんでした。", "error");
          return;
        }
        state.db.devLogs = items.concat(state.db.devLogs);
        saveDatabase();
        state.aiText = "";
        renderApp();
        setNotice(`${items.length}件の商品開発ログを追加しました。`, "success");
      }

      function mapAiLogItem(raw) {
        if (!raw || typeof raw !== "object") return null;
        return normalizeDevLog({
          date: raw.date,
          person: raw.person,
          inputPerson: raw.person,
          type: raw.type,
          recordType: raw.type,
          category: raw.category,
          genre: raw.category,
          productName: raw.productName,
          product_name: raw.productName,
          problem: raw.problem,
          stage: raw.stage,
          a1mini: raw.a1mini,
          size: raw.size,
          material: raw.material,
          filament: raw.filament,
          printTime: raw.printTime,
          printDifficulty: raw.printDifficulty,
          demand: raw.demand,
          competition: raw.competition,
          targetPrice: raw.targetPrice,
          costMemo: raw.costMemo,
          familyRating: raw.familyRating,
          improvement: raw.improvement,
          nextAction: raw.nextAction,
          priority: raw.priority,
          memo: raw.memo
        });
      }

      function exportCsv(filename, headers, rows) {
        const csv = [
          headers.join(","),
          ...rows.map((row) => row.map((cell) => csvEscape(cell)).join(","))
        ].join("\n");
        downloadText(filename, csv, "text/csv;charset=utf-8");
      }

      function csvEscape(value) {
        const text = String(value ?? "");
        if (/[",\n]/.test(text)) {
          return `"${text.replaceAll('"', '""')}"`;
        }
        return text;
      }

      function productCsvRows() {
        return state.db.products
          .slice()
          .sort((a, b) => a.name.localeCompare(b.name, "ja"))
          .map((product) => [
            product.id,
            product.createdAt,
            product.updatedAt,
            product.name,
            product.category,
            product.stage,
            product.price ?? "",
            product.cost ?? "",
            product.printTime,
            product.material,
            product.priority,
            product.memo,
            product.active ? "有効" : "無効"
          ]);
      }

      function devLogCsvRows() {
        return state.db.devLogs
          .slice()
          .sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")))
          .map((log) => [
            log.id,
            log.createdAt,
            log.updatedAt,
            log.date,
            log.inputPerson,
            log.recordType,
            log.productId,
            log.productName,
            log.genre,
            log.problem,
            log.stage,
            log.a1mini,
            log.size,
            log.material,
            log.filament,
            log.printTime,
            log.printDifficulty ?? "",
            log.demand ?? "",
            log.competition ?? "",
            log.targetPrice ?? "",
            log.costMemo,
            log.familyRating ?? "",
            log.improvement,
            log.nextAction,
            log.priority,
            log.memo
          ]);
      }

      function saleCsvRows() {
        return state.db.sales
          .map(enrichSale)
          .sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")))
          .map((sale) => [
            sale.id,
            sale.createdAt,
            sale.updatedAt,
            sale.date,
            sale.productId,
            sale.productLabel || sale.productName,
            sale.genreResolved || sale.genre,
            sale.channel,
            sale.unitPrice,
            sale.quantity,
            sale.salesAmount,
            sale.shipping,
            sale.fee,
            sale.materialCost,
            sale.packagingCost,
            sale.otherCost,
            sale.profit,
            sale.margin != null ? sale.margin.toFixed(1) : "",
            sale.buyerMemo,
            sale.improvementMemo
          ]);
      }

      function productAggCsvRows() {
        return buildProductAggregates().map((row) => [
          row.name,
          row.quantity,
          row.amount,
          row.profit,
          row.avgUnitPrice,
          row.avgMargin != null ? row.avgMargin.toFixed(1) : ""
        ]);
      }

      function monthAggCsvRows() {
        return buildMonthAggregates().map((row) => [row.month, row.quantity, row.amount, row.profit]);
      }

      function genreAggCsvRows() {
        return buildGenreAggregates().map((row) => [row.genre, row.count, row.quantity, row.amount, row.profit]);
      }

      function downloadText(filename, text, mime) {
        const blob = new Blob([text], { type: mime });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function loadImportFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          state.importText = String(reader.result || "");
          const textarea = document.getElementById("import-json-text");
          if (textarea) textarea.value = state.importText;
          setNotice("JSONファイルを読み込みました。取り込みボタンで復元してください。", "success");
        };
        reader.onerror = () => showNotice("JSONファイルの読み込みに失敗しました。", "error");
        reader.readAsText(file);
      }

      function readFileText(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("ファイルの読み込みに失敗しました"));
          reader.readAsText(file);
        });
      }

      function handleDocumentClick(event) {
        const tabButton = event.target.closest("[data-tab]");
        if (tabButton) {
          state.tab = tabButton.dataset.tab;
          renderApp();
          return;
        }

        const actionButton = event.target.closest("[data-action]");
        if (!actionButton) return;
        const action = actionButton.dataset.action;
        const id = actionButton.dataset.id;
        if (action === "logout") return void signOutFirebase();
        if (action === "continue-local") {
          setAuthState({ ready: true, localMode: true, user: null, email: "", error: "" });
          setSessionToLocal("FirebaseConfig が未設定のためローカル表示を続けます");
          renderApp();
          return;
        }
        if (action === "migrate-local-to-firestore") return void migrateLocalCacheToFirestore();
        if (action === "reset-product") return resetProductForm();
        if (action === "reset-devlog") return resetDevLogForm();
        if (action === "reset-sale") return resetSaleForm();
        if (action === "edit-product") {
          const product = resolveProduct(id);
          if (!product) return;
          populateProductForm(product);
          state.tab = "products";
          renderApp();
          setNotice("商品を編集モードで読み込みました。", "success");
          return;
        }
        if (action === "toggle-product") return toggleProductActive(id);
        if (action === "delete-product") return deleteById("products", id);
        if (action === "edit-devlog") {
          const log = state.db.devLogs.find((item) => item.id === id);
          if (!log) return;
          populateDevLogForm(log);
          state.tab = "devlogs";
          renderApp();
          setNotice("商品開発ログを編集モードで読み込みました。", "success");
          return;
        }
        if (action === "delete-devlog") return deleteById("devLogs", id);
        if (action === "edit-sale") {
          const sale = state.db.sales.find((item) => item.id === id);
          if (!sale) return;
          populateSaleForm(sale);
          state.tab = "sales-input";
          renderApp();
          updateSalePreview();
          setNotice("売上を編集モードで読み込みました。", "success");
          return;
        }
        if (action === "delete-sale") return deleteById("sales", id);
        if (action === "export-json") return exportJson();
        if (action === "import-json") {
          const textArea = document.getElementById("import-json-text");
          if (textArea) state.importText = textArea.value;
          const fileInput = document.getElementById("import-json-file");
          if (fileInput && fileInput.files && fileInput.files[0] && !normalizeText(state.importText)) {
            return readFileText(fileInput.files[0])
              .then((text) => {
                state.importText = text;
                const textarea = document.getElementById("import-json-text");
                if (textarea) textarea.value = text;
                importJsonFromText(text);
              })
              .catch(() => showNotice("JSONファイルの読み込みに失敗しました。", "error"));
          }
          return importJsonFromText(state.importText);
        }
        if (action === "import-ai-log") {
          const textArea = document.getElementById("ai-import-text");
          if (textArea) state.aiText = textArea.value;
          return importAiLogs(state.aiText);
        }
        if (action === "export-csv-products") return exportCsv(filenameSlug("products", "csv"), ["id", "createdAt", "updatedAt", "name", "category", "stage", "price", "cost", "printTime", "material", "priority", "memo", "active"], productCsvRows());
        if (action === "export-csv-devlogs") return exportCsv(filenameSlug("devlogs", "csv"), ["id", "createdAt", "updatedAt", "date", "inputPerson", "recordType", "productId", "productName", "genre", "problem", "stage", "a1mini", "size", "material", "filament", "printTime", "printDifficulty", "demand", "competition", "targetPrice", "costMemo", "familyRating", "improvement", "nextAction", "priority", "memo"], devLogCsvRows());
        if (action === "export-csv-sales") return exportCsv(filenameSlug("sales", "csv"), ["id", "createdAt", "updatedAt", "date", "productId", "productName", "genre", "channel", "unitPrice", "quantity", "salesAmount", "shipping", "fee", "materialCost", "packagingCost", "otherCost", "profit", "margin", "buyerMemo", "improvementMemo"], saleCsvRows());
        if (action === "export-csv-product-agg") return exportCsv(filenameSlug("product-agg", "csv"), ["商品名", "販売個数合計", "売上金額合計", "推定利益合計", "平均販売単価", "平均利益率"], productAggCsvRows());
        if (action === "export-csv-month-agg") return exportCsv(filenameSlug("month-agg", "csv"), ["月", "販売個数合計", "売上金額合計", "推定利益合計"], monthAggCsvRows());
        if (action === "export-csv-genre-agg") return exportCsv(filenameSlug("genre-agg", "csv"), ["ジャンル", "登録商品数", "販売個数合計", "売上金額合計", "推定利益合計"], genreAggCsvRows());
      }

      function handleDocumentInput(event) {
        const target = event.target;
        const form = target.closest("form[data-form]");
        if (form) {
          const formName = form.dataset.form;
          if (formName === "auth") {
            if (target.name === "email") {
              state.auth.emailInput = target.value;
            }
            if (target.name === "password") {
              state.auth.passwordInput = target.value;
            }
            return;
          }
          if (formName === "product") {
            handleProductInput(target);
            return;
          }
          if (formName === "devlog") {
            handleDevLogInput(target);
            return;
          }
          if (formName === "sale") {
            handleSaleInput(target);
            return;
          }
        }
        if (target.matches("[data-filter='sales']")) {
          handleSalesFilterInput(target);
        }
      }

      function handleDocumentChange(event) {
        const target = event.target;
        if (target.id === "import-json-file") {
          loadImportFile(target.files && target.files[0]);
          return;
        }
        if (target.name === "importMode") {
          state.importMode = target.value;
          return;
        }
      }

      function handleProductInput(target) {
        const draft = state.forms.product;
        if (!target.name) return;
        if (target.type === "checkbox") {
          draft[target.name] = target.checked;
        } else {
          draft[target.name] = target.value;
        }
      }

      function handleDevLogInput(target) {
        const draft = state.forms.devlog;
        if (!target.name) return;
        if (target.name === "productId") {
          draft.productId = target.value;
          const product = resolveProduct(target.value);
          if (product) {
            draft.productName = product.name;
            draft.genre = product.category || draft.genre;
            draft.stage = product.stage || draft.stage;
            const nameInput = document.querySelector("form[data-form='devlog'] input[name='productName']");
            const genreSelect = document.querySelector("form[data-form='devlog'] select[name='genre']");
            const stageSelect = document.querySelector("form[data-form='devlog'] select[name='stage']");
            if (nameInput) nameInput.value = draft.productName;
            if (genreSelect) genreSelect.value = draft.genre;
            if (stageSelect) stageSelect.value = draft.stage;
          } else {
            draft.productName = "";
            draft.genre = GENRES[0];
            draft.stage = STAGES[0];
            const nameInput = document.querySelector("form[data-form='devlog'] input[name='productName']");
            const genreSelect = document.querySelector("form[data-form='devlog'] select[name='genre']");
            const stageSelect = document.querySelector("form[data-form='devlog'] select[name='stage']");
            if (nameInput) nameInput.value = "";
            if (genreSelect) genreSelect.value = draft.genre;
            if (stageSelect) stageSelect.value = draft.stage;
          }
          return;
        }
        draft[target.name] = target.value;
      }

      function handleSaleInput(target) {
        const draft = state.forms.sale;
        if (!target.name) return;
        if (target.name === "productId") {
          draft.productId = target.value;
          const product = resolveProduct(target.value);
          if (product) {
            draft.productName = product.name;
            draft.genre = product.category || draft.genre;
            draft.unitPrice = product.price ?? "";
            draft.materialCost = product.cost ?? "";
          } else {
            draft.productName = "";
            draft.genre = "";
            draft.unitPrice = "";
            draft.materialCost = "";
          }
          syncSaleFormFields();
          updateSalePreview();
          return;
        }
        draft[target.name] = target.value;
        if (target.name === "unitPrice" || target.name === "quantity" || target.name === "shipping" || target.name === "fee" || target.name === "materialCost" || target.name === "packagingCost" || target.name === "otherCost") {
          updateSalePreview();
        }
      }

      function syncSaleFormFields() {
        const form = document.querySelector("form[data-form='sale']");
        if (!form) return;
        const genre = form.querySelector("input[name='genre']");
        const unitPrice = form.querySelector("input[name='unitPrice']");
        const materialCost = form.querySelector("input[name='materialCost']");
        if (genre) genre.value = state.forms.sale.genre || "";
        if (unitPrice) unitPrice.value = state.forms.sale.unitPrice ?? "";
        if (materialCost) materialCost.value = state.forms.sale.materialCost ?? "";
      }

      function updateSalePreview() {
        const preview = calculateSalePreview(state.forms.sale);
        const profit = document.querySelector("[data-preview='profit']");
        const margin = document.querySelector("[data-preview='margin']");
        const source = document.querySelector("[data-preview='source']");
        if (profit) profit.textContent = formatYen(preview.profit);
        if (margin) margin.textContent = formatPercent(preview.margin);
        if (source) source.textContent = state.forms.sale.productId ? (resolveProduct(state.forms.sale.productId)?.name || state.forms.sale.productName || "未選択") : (state.forms.sale.productName || "未選択");
        const amountInput = document.querySelector("form[data-form='sale'] input[name='salesAmount']");
        if (amountInput) amountInput.value = formatYen(preview.salesAmount);
      }

      function handleSalesFilterInput(target) {
        const key = target.name;
        if (target.type === "checkbox") {
          state.filters[key] = target.checked;
        } else {
          state.filters[key] = target.value;
        }
        renderSalesTableSection();
      }

      function handleDocumentSubmit(event) {
        const form = event.target.closest("form[data-form]");
        if (!form) return;
        event.preventDefault();
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }
        const name = form.dataset.form;
        if (name === "auth") {
          const action = event.submitter?.dataset?.authAction || "login";
          return void signInOrRegister(action === "register" ? "register" : "login");
        }
        if (name === "product") return saveProductDraft();
        if (name === "devlog") return saveDevLogDraft();
        if (name === "sale") return saveSaleDraft();
      }

      function initialize() {
        state.db = loadDatabase();
        state.forms.product = emptyProductDraft();
        state.forms.devlog = emptyDevLogDraft();
        state.forms.sale = emptySaleDraft();
        saveDatabase();
        attachGlobalListeners();
        syncSaleFormFields();
        updateSalePreview();
        void initializeFirebaseServices();
        renderApp();
      }

      function attachGlobalListeners() {
        document.addEventListener("click", handleDocumentClick);
        document.addEventListener("input", handleDocumentInput);
        document.addEventListener("change", handleDocumentChange);
        document.addEventListener("submit", handleDocumentSubmit);
      }

      initialize();
    </script>
  </body>
</html>
